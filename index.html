<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">

                <div class="info">
                    <h3>High score:
                        <span class="high-score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Score:
                        <span class="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Time:
                        <span class="time">00-00</span>
                    </h3>
                </div>
            </div>

            <div class="board">
                <!-- // The game board will be rendered here by JavaScript -->
            </div>

        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to snake Game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
